<section id="scan-upload" class="scan-upload-card" data-receipt-upload aria-labelledby="scan-upload-title">
  <header class="scan-upload-header">
    <div>
      <p class="eyebrow">Steg 1</p>
      <h2 id="scan-upload-title" class="section-title">Ladda upp kvitto</h2>
      <p class="section-text">
        Ta en bild direkt med kameran eller välj en bild från mobilen. JPG, PNG och WEBP stöds.
      </p>
    </div>
  </header>

  <form
    hx-post="/api/receipts/scan"
    hx-encoding="multipart/form-data"
    hx-target="#scan-result"
    hx-swap="innerHTML"
    hx-indicator="#scan-loading-indicator"
    class="scan-upload-form"
  >
    {% csrf_token %}

    <input
      id="receipt-image-input"
      name="image"
      type="file"
      accept="image/jpeg,image/png,image/webp"
      capture="environment"
      class="sr-only"
      data-receipt-file
      required
    >

    <div class="scan-upload-actions">
      <button type="button" class="btn-primary w-full" data-upload-trigger>
        Scanna med kamera
      </button>
      <button type="button" class="btn-secondary w-full" data-upload-trigger>
        Välj bild
      </button>
    </div>

    <div class="upload-empty-state" data-upload-empty>
      <div class="upload-empty-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8">
          <path
            d="M4 7h3l2-3h6l2 3h3v13H4V7Z"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linejoin="round"
          />
          <path
            d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
            stroke="currentColor"
            stroke-width="2.4"
          />
        </svg>
      </div>

      <div>
        <p class="upload-empty-title">Ingen bild vald ännu</p>
        <p class="upload-empty-text">
          När du väljer en bild visas förhandsvisningen här innan du startar skanningen.
        </p>
      </div>
    </div>

    <figure class="upload-preview-card hidden" data-upload-preview-wrap>
      <img
        src=""
        alt="Förhandsvisning av valt kvitto"
        class="upload-preview-image"
        data-receipt-preview
      >
      <figcaption class="upload-preview-caption" data-file-name></figcaption>
    </figure>

    <button type="submit" class="btn-primary w-full">
      Starta skanning
    </button>

    <div id="scan-loading-indicator" class="scan-loading htmx-indicator" aria-live="polite">
      <span class="scan-loading-spinner" aria-hidden="true"></span>
      <span>Analyserar kvittot...</span>
    </div>
  </form>

  <section id="scan-result" class="scan-result-slot" aria-live="polite"></section>
</section>
