<div class="rounded-2xl bg-white p-4 shadow-sm sm:p-6">
  <h2 class="mb-4 text-lg font-semibold text-gray-900">Verifiera kvittodata</h2>
  <form class="space-y-3">
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Butik</span>
      <input type="text" value="{{ receipt.vendor }}" class="w-full rounded-xl bg-gray-100 px-4 py-3 text-base text-gray-900">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Totalbelopp</span>
      <input type="text" value="{{ receipt.total_amount|default_if_none:'' }}" class="w-full rounded-xl bg-gray-100 px-4 py-3 text-base text-gray-900">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Moms</span>
      <input type="text" value="{{ receipt.vat_amount|default_if_none:'' }}" class="w-full rounded-xl bg-gray-100 px-4 py-3 text-base text-gray-900">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Datum</span>
      <input type="date" value="{{ receipt.date|date:'Y-m-d' }}" class="w-full rounded-xl bg-gray-100 px-4 py-3 text-base text-gray-900">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Kategori</span>
      <input type="text" value="{{ receipt.category }}" class="w-full rounded-xl bg-gray-100 px-4 py-3 text-base text-gray-900">
    </label>
    <button type="button" class="w-full rounded-xl bg-emerald-700 px-4 py-4 text-base font-semibold text-white">
      Spara kvitto
    </button>
  </form>
</div>
