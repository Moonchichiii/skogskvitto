<div class="card">
  <h2 class="card-title">Granska kvittot</h2>
  <p class="section-text">Kontrollera uppgifterna innan du sparar kvittot.</p>

  <form hx-post="/api/receipts/save" hx-target="this" hx-swap="outerHTML" class="mt-5 space-y-4">
    <input type="hidden" name="signed_scan_job" value="{{ signed_scan_job }}">

    <label class="form-label">
      Leverantör
      <input id="vendor" name="vendor" type="text" value="{{ preview.vendor }}" class="form-input">
    </label>

    <div class="grid gap-4 sm:grid-cols-2">
      <label class="form-label">
        Belopp
        <input id="total_amount" name="total_amount" type="text" value="{{ preview.total_amount }}" class="form-input">
      </label>

      <label class="form-label">
        Moms
        <input id="vat_amount" name="vat_amount" type="text" value="{{ preview.vat_amount }}" class="form-input">
      </label>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <label class="form-label">
        Datum
        <input id="date" name="date" type="date" value="{{ preview.date }}" class="form-input">
      </label>

      <label class="form-label">
        Kategori
        <input id="category" name="category" type="text" value="{{ preview.category }}" class="form-input">
      </label>
    </div>

    <label class="form-label">
      Anteckning
      <textarea id="note" name="note" rows="3" class="form-input">{{ preview.note }}</textarea>
    </label>

    <button type="submit" class="btn-primary w-full">Spara kvitto</button>
  </form>

  <div class="mt-6 rounded-3xl border border-stone-200 bg-stone-50 p-4">
    <h3 class="font-bold text-emerald-950">Behöver något rättas?</h3>
    <p class="mt-1 text-sm text-stone-600">
      Skriv vad som inte stämmer, så försöker SkogsKvitto föreslå en korrigering.
    </p>

    <form
      hx-post="/api/receipts/correction-suggestion"
      hx-target="#correction-result"
      hx-swap="innerHTML"
      class="mt-4 space-y-3"
    >
      <input type="hidden" name="signed_scan_job" value="{{ signed_scan_job }}">
      <textarea
        name="correction_text"
        rows="2"
        class="form-input bg-white"
        placeholder="Exempel: Beloppet ska vara 1 249 kr"
      ></textarea>
      <button type="submit" class="btn-secondary w-full">Föreslå korrigering</button>
    </form>

    <div id="correction-result" class="mt-3"></div>
  </div>
</div>
