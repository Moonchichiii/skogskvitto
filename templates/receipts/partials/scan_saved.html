<section class="scan-saved-card" aria-labelledby="scan-saved-title">
  <div class="scan-saved-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8">
      <path
        d="M5 12.5l4.2 4.2L19 7"
        stroke="currentColor"
        stroke-width="2.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </div>

  <div>
    <p class="eyebrow">Kvitto sparat</p>
    <h2 id="scan-saved-title" class="scan-saved-title">
      Klart. Kvittot är sparat.
    </h2>
    <p class="scan-saved-text">
      {% if receipt.vendor %}
        Kvittot från <strong>{{ receipt.vendor }}</strong> är nu sparat i ditt underlag.
      {% else %}
        Kvittot är nu sparat i ditt underlag.
      {% endif %}
    </p>
  </div>

  <div class="scan-saved-actions">
    <a href="{% url 'dashboard' %}" class="btn-primary w-full">
      Gå till granskning
    </a>
    <a href="{% url 'scan' %}" class="btn-secondary w-full">
      Scanna ett till kvitto
    </a>
  </div>
</section>
