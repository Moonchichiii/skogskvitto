{% if has_suggestion %}
<div class="rounded-2xl border border-emerald-100 bg-emerald-50 p-4 text-sm text-emerald-900">
  <p class="font-semibold">AI-fÃ¶rslag</p>
  <p class="mt-1">{{ message }}</p>
  {% if suggestion.total_amount %}
  <p class="mt-1">Belopp: {{ suggestion.total_amount }}</p>
  {% endif %}
  {% if suggestion.category %}
  <p class="mt-1">Kategori: {{ suggestion.category }}</p>
  {% endif %}
  <div
    class="mt-3 flex gap-2"
    x-data="{ applySuggestion(button) { if (button.dataset.totalAmount) { document.getElementById('total_amount').value = button.dataset.totalAmount; } if (button.dataset.category) { document.getElementById('category').value = button.dataset.category; } } }"
  >
    <button
      type="button"
      class="rounded-xl bg-emerald-700 px-3 py-2 text-xs font-semibold text-white"
      data-total-amount="{{ suggestion.total_amount|default:'' }}"
      data-category="{{ suggestion.category|default:'' }}"
      x-on:click="applySuggestion($el)"
    >
      AnvÃ¤nd fÃ¶rslag
    </button>
    <button type="button" class="rounded-xl border border-gray-300 bg-white px-3 py-2 text-xs font-semibold text-gray-700" onclick="this.closest('div').remove()">
      Ignorera
    </button>
  </div>
</div>
{% else %}
<div class="rounded-2xl border border-gray-200 bg-white p-4 text-sm text-gray-600">
  <p>Ingen tydlig korrigering hittades.</p>
</div>
{% endif %}
