{% if has_suggestion %}
<div class="rounded-3xl border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-950" data-dismissible>
  <p class="font-bold">AI-förslag</p>
  <p class="mt-1">{{ message }}</p>

  {% if suggestion.total_amount %}
    <p class="mt-2">Belopp: <strong>{{ suggestion.total_amount }}</strong></p>
  {% endif %}

  {% if suggestion.category %}
    <p class="mt-1">Kategori: <strong>{{ suggestion.category }}</strong></p>
  {% endif %}

  <div class="mt-4 flex flex-col gap-2 sm:flex-row">
    <button
      type="button"
      class="btn-primary"
      data-apply-correction
      data-total-amount="{{ suggestion.total_amount|default:'' }}"
      data-category="{{ suggestion.category|default:'' }}"
    >
      Använd förslag
    </button>
    <button type="button" class="btn-secondary" data-dismiss-parent>Ignorera</button>
  </div>
</div>
{% else %}
<div class="notice">
  Ingen tydlig korrigering hittades.
</div>
{% endif %}
