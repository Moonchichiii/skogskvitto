<section class="scan-result-card" aria-labelledby="scan-result-title">
  <header class="scan-result-header">
    <div>
      <p class="eyebrow">Steg 2</p>
      <h2 id="scan-result-title" class="section-title">Granska kvittot</h2>
      <p class="section-text">
        Kontrollera uppgifterna innan du sparar. AI-tolkningen är bara ett stöd.
      </p>
    </div>
    <span class="scan-status-pill">Redo att granskas</span>
  </header>

  <form
    hx-post="/scanning/confirm/"
    hx-target="this"
    hx-swap="outerHTML"
    class="scan-review-form"
  >
    {% csrf_token %}
    <input type="hidden" name="scan_job_id" value="{{ scan_job_id }}">
    <input type="hidden" name="signature" value="{{ signature }}">

    <label class="form-label" for="vendor">
      Leverantör
      <input
        id="vendor"
        name="vendor"
        type="text"
        value="{{ preview.vendor }}"
        class="form-input"
        autocomplete="organization"
      >
    </label>

    <div class="grid gap-4 sm:grid-cols-2">
      <label class="form-label" for="total_amount">
        Belopp
        <input
          id="total_amount"
          name="total_amount"
          type="text"
          inputmode="decimal"
          value="{{ preview.total_amount }}"
          class="form-input"
          placeholder="Exempel: 1249.00"
        >
      </label>

      <label class="form-label" for="vat_amount">
        Moms
        <input
          id="vat_amount"
          name="vat_amount"
          type="text"
          inputmode="decimal"
          value="{{ preview.vat_amount }}"
          class="form-input"
          placeholder="Exempel: 249.80"
        >
      </label>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <label class="form-label" for="date">
        Datum
        <input
          id="date"
          name="date"
          type="date"
          value="{{ preview.date }}"
          class="form-input"
        >
      </label>

      <label class="form-label" for="category">
        Kategori
        <input
          id="category"
          name="category"
          type="text"
          value="{{ preview.category }}"
          class="form-input"
          placeholder="Exempel: Drivmedel"
        >
      </label>
    </div>

    <label class="form-label" for="note">
      Anteckning
      <textarea
        id="note"
        name="note"
        rows="4"
        class="form-input resize-y"
        placeholder="Valfri anteckning till kvittot"
      >{{ preview.note }}</textarea>
    </label>

    <button type="submit" class="btn-primary w-full">Spara kvitto</button>
  </form>

  <aside class="correction-panel" aria-labelledby="correction-title">
    <div>
      <p class="eyebrow">Behöver något rättas?</p>
      <h3 id="correction-title">Beskriv vad som inte stämmer.</h3>
      <p>Skriv en kort korrigering, till exempel att beloppet eller kategorin är fel.</p>
    </div>

    <form
      hx-post="/scanning/correction/"
      hx-target="#correction-result"
      hx-swap="innerHTML"
      class="correction-form"
    >
      {% csrf_token %}
      <input type="hidden" name="scan_job_id" value="{{ scan_job_id }}">
      <input type="hidden" name="signature" value="{{ signature }}">

      <label class="sr-only" for="correction_text">Beskriv korrigering</label>
      <textarea
        id="correction_text"
        name="correction_text"
        rows="3"
        class="form-input bg-white"
        placeholder="Exempel: Beloppet ska vara 1 249 kr och kategorin är material."
      ></textarea>

      <button type="submit" class="btn-secondary w-full">Föreslå korrigering</button>
    </form>

    <div id="correction-result" class="mt-4"></div>
  </aside>
</section>
