<div
  x-data="cookieBanner()"
  x-show="visible"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 translate-y-4"
  class="fixed bottom-4 left-4 right-4 z-50 mx-auto max-w-2xl rounded-2xl bg-white p-5 shadow-lg sm:bottom-6 sm:left-6 sm:right-6"
  role="dialog"
  aria-label="Cookie-samtycke"
>
  <p class="mb-1 text-sm font-semibold text-gray-900">Vi använder cookies</p>
  <p class="mb-4 text-sm text-gray-600 leading-relaxed">
    SkogsKvitto använder enbart <strong>nödvändiga cookies</strong> för inloggning, CSRF-skydd och sessionshantering.
    Vi använder inga spårnings- eller marknadsföringscookies.
    <a href="{% url 'cookies' %}" class="underline hover:text-emerald-700">Läs mer om cookies</a>.
  </p>
  <div class="flex gap-2">
    <button
      @click="accept()"
      class="rounded-xl bg-emerald-700 px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-emerald-800 focus:outline-none focus:ring-2 focus:ring-emerald-700 focus:ring-offset-2"
    >
      Förstått
    </button>
  </div>
</div>

<script>
  function cookieBanner() {
    function getConsent() {
      try { return localStorage.getItem('cookie_consent'); } catch (_) { return null; }
    }
    return {
      visible: !getConsent(),
      accept() {
        try { localStorage.setItem('cookie_consent', 'necessary'); } catch (_) { /* private mode */ }
        this.visible = false;
      },
    };
  }
</script>
