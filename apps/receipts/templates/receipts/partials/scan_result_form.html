<div
  x-data="{ show: false }"
  x-init="requestAnimationFrame(() => show = true)"
  x-show="show"
  x-transition.opacity.duration.200ms
  class="rounded-2xl border border-gray-100 bg-white p-4 shadow-sm sm:p-6"
>
  <h2 class="mb-4 text-lg font-semibold text-gray-900">Granska kvittot</h2>
  <form
    hx-post="/api/receipts/save"
    hx-target="this"
    hx-swap="outerHTML"
    class="space-y-3"
  >
    <input type="hidden" name="signed_scan_job" value="{{ signed_scan_job }}">
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Leverantör</span>
      <input id="vendor" name="vendor" type="text" value="{{ preview.vendor }}" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Belopp</span>
      <input id="total_amount" name="total_amount" type="text" value="{{ preview.total_amount }}" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Moms</span>
      <input id="vat_amount" name="vat_amount" type="text" value="{{ preview.vat_amount }}" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Datum</span>
      <input id="date" name="date" type="date" value="{{ preview.date }}" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Kategori</span>
      <input id="category" name="category" type="text" value="{{ preview.category }}" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-gray-700">Anteckning</span>
      <textarea id="note" name="note" rows="2" class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-base text-gray-900 transition-all duration-200 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700">{{ preview.note }}</textarea>
    </label>
    <button type="submit" class="w-full rounded-2xl bg-emerald-700 px-4 py-4 text-base font-semibold text-white transition-all duration-200 hover:bg-emerald-800">
      Spara kvitto
    </button>
  </form>

  <div class="mt-5 rounded-2xl border border-gray-100 bg-gray-50 p-4">
    <h3 class="text-sm font-semibold text-gray-900">Behöver något rättas?</h3>
    <p class="mt-1 text-sm text-gray-600">Skriv vad som inte stämmer, så hjälper vi dig att korrigera kvittot.</p>
    <form hx-post="/api/receipts/correction-suggestion" hx-target="#correction-result" hx-swap="innerHTML" class="mt-3 space-y-3">
      <input type="hidden" name="signed_scan_job" value="{{ signed_scan_job }}">
      <textarea name="correction_text" rows="2" class="w-full rounded-2xl border border-gray-100 bg-white px-4 py-3 text-sm text-gray-900 focus:border-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-700" placeholder="Exempel: Beloppet ska vara 1 249 kr"></textarea>
      <button type="submit" class="w-full rounded-2xl border border-emerald-700 bg-white px-4 py-3 text-sm font-semibold text-emerald-800 hover:bg-emerald-50">
        Föreslå korrigering
      </button>
    </form>
    <div id="correction-result" class="mt-3"></div>
  </div>
</div>
