name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: skogskvitto
          POSTGRES_USER: skogskvitto
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skogskvitto -d skogskvitto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SECRET_KEY: ci
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DJANGO_SECURE_HSTS_SECONDS: "0"

      DATABASE_URL: postgres://skogskvitto@127.0.0.1:5432/skogskvitto
      POSTGRES_DB: skogskvitto
      POSTGRES_USER: skogskvitto
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_PRICE_MONTHLY_ID: price_ci_monthly
      STRIPE_PRICE_YEARLY_ID: price_ci_yearly

      FREEMIUM_RECEIPT_LIMIT: "10"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4.1-mini

      PRIVACY_CONTACT: privacy@example.test

      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@example.test
      EMAIL_HOST: localhost
      EMAIL_PORT: "1025"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Django system check
        run: uv run python manage.py check

      - name: Check migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest
