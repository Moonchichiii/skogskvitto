# fly.toml — SkogsKvitto app configuration
# See https://fly.io/docs/reference/configuration/ for documentation.

app = 'skogskvitto'
primary_region = 'arn'  # Stockholm — närmast Upstash Ireland + svenska användare
console_command = 'python manage.py shell'

[build]
  dockerfile = 'infra/Dockerfile'

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8080'

# ============================================================
# Processes — two separate machines:
#   `app`    serves HTTP requests (gunicorn + uvicorn workers, matches Dockerfile)
#   `worker` consumes the RQ queues (scanning, default)
# ============================================================
[processes]
  app = 'gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 --workers 1 --timeout 120'
  worker = 'python manage.py rqworker scanning default'

# ============================================================
# HTTP service — applies only to the `app` process
# ============================================================
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# ============================================================
# VM resources per process group
# ============================================================
[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['worker']

# ============================================================
# Static files
# ============================================================
[[statics]]
  guest_path = '/app/staticfiles'
  url_prefix = '/static/'